<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos | Interaktive Weltkulturerbe-Expedition</title>

    <style>
        :root {
            --bg-blur: blur(24px) saturate(190%);
            --glass-bg-light: rgba(255, 255, 255, 0.45);
            --glass-bg-dark: rgba(20, 20, 25, 0.7);
            --glass-border-light: rgba(255, 255, 255, 0.4);
            --glass-border-dark: rgba(255, 255, 255, 0.08);
            --accent-color: #0071e3;
            --accent-glow: rgba(0, 113, 227, 0.4);
            --text-primary-light: #1d1d1f;
            --text-secondary-light: #86868b;
            --text-primary-dark: #f5f5f7;
            --text-secondary-dark: #a1a1a6;
            --surface-bg: var(--glass-bg-dark);
            --surface-border: var(--glass-border-dark);
            --text-main: var(--text-primary-dark);
            --text-muted: var(--text-secondary-dark);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b0b0d; }
        
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0b0b0d; }
        
        .ambient-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(11, 11, 13, 0) 30%, rgba(11, 11, 13, 0.6) 80%);
            pointer-events: none; z-index: 2;
        }

        .app-header {
            position: absolute; top: 20px; left: 20px; right: 20px; height: 72px;
            background: var(--surface-bg); backdrop-filter: var(--bg-blur); -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--surface-border); border-radius: 18px; z-index: 10; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
        }

        .brand-text h1 { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--text-main); }
        .brand-text p { font-size: 11px; color: var(--text-muted); }

        .gamification-hub { display: flex; align-items: center; gap: 16px; }
        .badge-container { background: rgba(255, 255, 255, 0.06); padding: 6px 14px; border-radius: 20px; color: var(--text-main); font-size: 12px; font-weight: 600; }
        .xp-bar-wrapper { width: 180px; text-align: left; }
        .xp-labels { font-size: 10px; color: var(--text-muted); display: flex; justify-content: space-between; margin-bottom: 4px; }
        .xp-bar-outer { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
        .xp-bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent-color), #54a6ff); width: 0%; transition: width 0.5s ease; }

        .main-container { position: absolute; top: 112px; left: 20px; bottom: 20px; width: 480px; z-index: 10; pointer-events: none; }
        .story-sidebar {
            width: 100%; height: 100%; background: var(--surface-bg); backdrop-filter: var(--bg-blur); -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--surface-border); border-radius: 24px; padding: 32px; overflow-y: auto; pointer-events: auto;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
        }

        .story-sidebar::-webkit-scrollbar { width: 6px; }
        .story-sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 3px; }

        .panel-state { display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s ease; }
        .panel-state.active { display: block; opacity: 1; transform: translateY(0); }

        .accent-tag { font-size: 10px; font-weight: 700; color: var(--accent-color); letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
        h2 { font-size: 24px; color: var(--text-main); margin-bottom: 12px; line-height: 1.3; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .lead-text { font-size: 13.5px; line-height: 1.6; color: var(--text-muted); margin-bottom: 20px; }

        .instruction-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 14px; padding: 16px; margin-bottom: 20px; }
        .ins-step { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        .ins-step:last-child { margin-bottom: 0; }
        .step-num { width: 24px; height: 24px; background: rgba(0, 113, 227, 0.15); color: #54a6ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
        .ins-step p { font-size: 12.5px; color: var(--text-muted); }

        .quick-selector-title { font-size: 11px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; text-transform: uppercase; }
        .quick-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .quick-item { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 12px; cursor: pointer; text-align: left; color: var(--text-main); transition: all 0.2s ease; }
        .quick-item:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--accent-color); transform: translateY(-2px); }
        .quick-item-title { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .quick-item-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
